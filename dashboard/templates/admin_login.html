<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Login — BootHop Pipeline</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#08080f;--card:#121220;--or:#ff6b00;--gr:linear-gradient(135deg,#ff6b00,#ffb800);--text:#e0e0f0;--muted:#8888a8;--red:#ff4040;--r:14px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{width:100%;max-width:360px}
.logo{font-size:1rem;font-weight:900;background:var(--gr);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:24px}
.badge{text-align:center;font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
h1{font-size:1.4rem;font-weight:900;text-align:center;margin-bottom:24px}
.card{background:var(--card);border:1px solid #ffffff12;border-radius:var(--r);padding:28px}
label{display:block;font-size:.73rem;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;margin-top:14px}
label:first-child{margin-top:0}
input{width:100%;background:#1a1a2e;border:1px solid #ffffff18;border-radius:8px;padding:11px 14px;color:var(--text);font-size:.9rem;outline:none}
input:focus{border-color:var(--or)}
.btn{width:100%;padding:13px;background:var(--gr);color:#000;font-weight:800;font-size:.95rem;border:none;border-radius:8px;cursor:pointer;margin-top:20px}
.err{background:#ff404020;border:1px solid #ff404040;border-radius:8px;padding:10px 14px;color:var(--red);font-size:.83rem;margin-bottom:16px}
.back{text-align:center;margin-top:16px;font-size:.78rem;color:var(--muted)}
.back a{color:var(--or);text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">⚡ BootHop Pipeline</div>
  <div class="badge">Admin Access</div>
  <h1>Admin Login</h1>
  {% if error %}<div class="err">{{ error }}</div>{% endif %}
  <div class="card">
    <form method="post" action="/admin/login">
      <label>Admin Password</label>
      <input type="password" name="password" required autofocus placeholder="Enter admin password">
      <button class="btn">Access Admin →</button>
    </form>
  </div>
  <div class="back"><a href="/">← Back to homepage</a></div>
</div>
</body>
</html>
